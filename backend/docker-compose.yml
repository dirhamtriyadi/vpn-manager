services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-vpn_manager}
    # Bind Postgres to loopback ONLY. The API uses host networking and reaches it
    # on 127.0.0.1, so the DB must NOT be published on 0.0.0.0 (that exposes it to
    # the internet on a public VPS — a default-password Postgres gets brute-forced
    # and RCE'd within minutes). Override DB_BIND only if you really need remote DB.
    ports:
      - "${DB_BIND:-127.0.0.1}:${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-vpn_manager}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    # WireGuard needs to create a netlink device and bind the listen port on the host.
    # host networking + NET_ADMIN is the simplest reliable setup. The host kernel
    # must have the wireguard module available.
    network_mode: host
    cap_add:
      - NET_ADMIN
    # Self-heal: if the API ever exits at boot (e.g. it lost a connection race
    # against a Postgres still doing WAL recovery), restart it instead of leaving
    # it Exited. Previously the API had no restart policy, so one bad boot left it
    # down until "docker compose down -v" wiped the volume.
    restart: unless-stopped
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}
      GIN_MODE: ${GIN_MODE:-release}
      # With host networking the API reaches Postgres on the host's published port.
      # Use 127.0.0.1 (IPv4) — "localhost" can resolve to ::1 and fail with
      # "cannot assign requested address".
      DB_HOST: ${DB_HOST:-127.0.0.1}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-vpn_manager}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      DEFAULT_ENDPOINT: ${DEFAULT_ENDPOINT:-vpn.example.com}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:5173}
      # Admin login. Change the password before exposing the panel; an empty
      # password locks the whole API. Set a long random AUTH_TOKEN_SECRET in
      # production (e.g. `openssl rand -hex 32`) to keep sessions across restarts.
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-change-me}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:-}
      AUTH_TOKEN_TTL_HOURS: ${AUTH_TOKEN_TTL_HOURS:-24}
      # VPN runtime execution (OpenVPN/L2TP/SSTP/PPTP). Off by default.
      VPN_EXECUTION_ENABLED: ${VPN_EXECUTION_ENABLED:-false}
      VPN_RUNTIME_ROOT: ${VPN_RUNTIME_ROOT:-/var/lib/vpn-manager}
      OPENVPN_SECRET_MASTER_KEY: ${OPENVPN_SECRET_MASTER_KEY:-}

  # Static frontend served by Nginx. The API URL is baked in at build time, so
  # set VITE_API_BASE_URL to a host the browser can reach (not "localhost" if
  # you open the panel from another machine).
  web:
    build:
      context: ../frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api/v1}
    ports:
      - "${WEB_PORT:-5173}:80"
    restart: unless-stopped

volumes:
  pgdata:
