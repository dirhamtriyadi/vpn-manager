basePath: /api/v1
definitions:
  dto.APIResponse:
    properties:
      code:
        type: string
      data: {}
      message:
        type: string
      meta: {}
      success:
        type: boolean
      warning:
        description: |-
          Warning is set when the primary operation succeeded and was persisted, but a
          secondary best-effort step degraded (e.g. the WireGuard kernel reconcile or
          a VPN runtime apply failed). The status stays 2xx because the resource change
          was committed; the warning carries the degradation detail for the client.
        type: string
    type: object
  dto.CreateInterfaceRequest:
    properties:
      address:
        example: 10.8.0.1/24
        type: string
      dns:
        example: 1.1.1.1
        maxLength: 128
        type: string
      egress_interface:
        description: EgressInterface is the WAN interface for NAT; auto-detected when
          empty.
        example: eth0
        maxLength: 32
        type: string
      enabled:
        example: true
        type: boolean
      endpoint:
        example: vpn.example.com
        maxLength: 255
        minLength: 3
        type: string
      listen_port:
        example: 51820
        maximum: 65535
        minimum: 1
        type: integer
      masquerade:
        description: Masquerade enables NAT + forwarding so clients get internet access.
        example: true
        type: boolean
      mtu:
        example: 1420
        maximum: 9000
        minimum: 576
        type: integer
      name:
        example: wg0
        maxLength: 32
        minLength: 2
        type: string
      private_key:
        example: ""
        type: string
    required:
    - address
    - endpoint
    - listen_port
    - name
    type: object
  dto.CreatePeerRequest:
    properties:
      assigned_ip:
        example: 10.8.0.2
        type: string
      client_allowed_ips:
        example: 0.0.0.0/0, ::/0
        type: string
      enabled:
        example: true
        type: boolean
      name:
        example: laptop-andi
        maxLength: 128
        minLength: 1
        type: string
      persistent_keepalive:
        example: 25
        maximum: 65535
        minimum: 0
        type: integer
      public_key:
        example: ""
        type: string
      use_preshared_key:
        example: true
        type: boolean
    required:
    - name
    type: object
  dto.CreatePortForwardRequest:
    properties:
      comment:
        maxLength: 128
        type: string
      interface_id:
        type: integer
      peer_id:
        type: integer
      protocol:
        enum:
        - tcp
        - udp
        type: string
      public_port:
        maximum: 65535
        minimum: 1
        type: integer
      target_port:
        maximum: 65535
        minimum: 1
        type: integer
    required:
    - interface_id
    - peer_id
    - protocol
    - public_port
    - target_port
    type: object
  dto.ErrorResponse:
    properties:
      code:
        type: string
      errors: {}
      message:
        type: string
      success:
        type: boolean
    type: object
  dto.LoginRequest:
    properties:
      password:
        example: change-me
        type: string
      username:
        example: admin
        type: string
    required:
    - password
    - username
    type: object
  dto.UpdateInterfaceRequest:
    properties:
      address:
        example: 10.8.0.1/24
        type: string
      dns:
        example: 1.1.1.1
        maxLength: 128
        type: string
      egress_interface:
        example: eth0
        maxLength: 32
        type: string
      enabled:
        example: true
        type: boolean
      endpoint:
        example: vpn.example.com
        maxLength: 255
        minLength: 3
        type: string
      listen_port:
        example: 51820
        maximum: 65535
        minimum: 1
        type: integer
      masquerade:
        example: true
        type: boolean
      mtu:
        example: 1420
        maximum: 9000
        minimum: 576
        type: integer
    required:
    - address
    - endpoint
    - listen_port
    type: object
  dto.UpdatePeerRequest:
    properties:
      client_allowed_ips:
        example: 0.0.0.0/0, ::/0
        type: string
      enabled:
        example: true
        type: boolean
      name:
        example: laptop-andi
        maxLength: 128
        minLength: 1
        type: string
      persistent_keepalive:
        example: 25
        maximum: 65535
        minimum: 0
        type: integer
    required:
    - name
    type: object
  dto.UpdatePortForwardRequest:
    properties:
      comment:
        maxLength: 128
        type: string
      enabled:
        type: boolean
      target_port:
        maximum: 65535
        minimum: 1
        type: integer
    type: object
host: localhost:8080
info:
  contact:
    email: support@example.com
    name: API Support
  description: |-
    Manage a WireGuard VPN concentrator (interfaces & peers) without touching the CLI.
    Keys, client configs and QR codes are generated server-side; peers are pushed to the kernel via netlink.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: VPN Manager API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Exchange a panel user's credentials for a bearer token.
      parameters:
      - description: Login payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Log in
      tags:
      - auth
  /auth/me:
    get:
      description: Return the authenticated user with roles and effective permissions.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Current user
      tags:
      - auth
  /interfaces:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
      summary: List interfaces
      tags:
      - interfaces
    post:
      consumes:
      - application/json
      parameters:
      - description: Interface payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateInterfaceRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Create an interface
      tags:
      - interfaces
  /interfaces/{id}:
    delete:
      parameters:
      - description: Interface ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Delete an interface
      tags:
      - interfaces
    get:
      parameters:
      - description: Interface ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Get an interface (with peers)
      tags:
      - interfaces
    put:
      consumes:
      - application/json
      parameters:
      - description: Interface ID
        in: path
        name: id
        required: true
        type: integer
      - description: Interface payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateInterfaceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Update an interface
      tags:
      - interfaces
  /interfaces/{id}/peers:
    get:
      parameters:
      - description: Interface ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
      summary: List peers of an interface
      tags:
      - peers
    post:
      consumes:
      - application/json
      description: Server auto-generates keys and IP when omitted
      parameters:
      - description: Interface ID
        in: path
        name: id
        required: true
        type: integer
      - description: Peer payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreatePeerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Add a peer
      tags:
      - peers
  /interfaces/{id}/status:
    get:
      description: Returns peers enriched with live handshake/transfer stats
      parameters:
      - description: Interface ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Interface runtime status
      tags:
      - interfaces
  /interfaces/{id}/sync:
    post:
      description: (Re)create the link and push the current peer set to WireGuard
      parameters:
      - description: Interface ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Apply interface to the kernel
      tags:
      - interfaces
  /peers/{peerId}:
    delete:
      parameters:
      - description: Peer ID
        in: path
        name: peerId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Delete a peer
      tags:
      - peers
    put:
      consumes:
      - application/json
      parameters:
      - description: Peer ID
        in: path
        name: peerId
        required: true
        type: integer
      - description: Peer payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UpdatePeerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Update a peer
      tags:
      - peers
  /peers/{peerId}/config:
    get:
      description: Returns the wg-quick .conf for this peer as plain text
      parameters:
      - description: Peer ID
        in: path
        name: peerId
        required: true
        type: integer
      produces:
      - text/plain
      responses:
        "200":
          description: OK
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Get client config
      tags:
      - peers
  /peers/{peerId}/qrcode:
    get:
      description: Returns a PNG QR code of the peer's wg-quick config
      parameters:
      - description: Peer ID
        in: path
        name: peerId
        required: true
        type: integer
      produces:
      - image/png
      responses:
        "200":
          description: OK
          schema:
            type: file
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Get client config QR code
      tags:
      - peers
  /port-forwards:
    get:
      description: Lists the caller's public-IP port forwards, optionally filtered
        by interface
      parameters:
      - description: Filter by interface ID
        in: query
        name: interface_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: List port forwards
      tags:
      - port-forwards
    post:
      consumes:
      - application/json
      description: Exposes a public port on the server WAN and DNATs it through the
        tunnel to a peer
      parameters:
      - description: Port forward
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreatePortForwardRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Create a port forward
      tags:
      - port-forwards
  /port-forwards/{id}:
    delete:
      description: Removes the firewall rules and the record permanently
      parameters:
      - description: Port forward ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Delete a port forward
      tags:
      - port-forwards
    get:
      parameters:
      - description: Port forward ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Get a port forward
      tags:
      - port-forwards
    put:
      consumes:
      - application/json
      description: Updates the target port, comment, or enabled state and re-applies
        firewall rules
      parameters:
      - description: Port forward ID
        in: path
        name: id
        required: true
        type: integer
      - description: Fields to update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdatePortForwardRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Update a port forward
      tags:
      - port-forwards
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and the token from /auth/login.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
